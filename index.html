<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>현재 위치 지도</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    #map {
      width: 100vw;
      height: 100vh;
    }

    /* 위치 아이콘 */
    .user-marker {
      width: 60px;
      height: 60px;

      background-image: url("icon/loc_icon.png");
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;

      transform-origin: center center;
    }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=75fcb2d4c1736608787e9ddc72170aad"></script>

<script>

  const mapContainer = document.getElementById('map');

  const map = new kakao.maps.Map(mapContainer, {
    center: new kakao.maps.LatLng(37.5665, 126.9780),
    level: 2
  });

  let overlay = null;
  let heading = 0;

  // 방향 센서
  window.addEventListener("deviceorientationabsolute", handleOrientation, true);
  window.addEventListener("deviceorientation", handleOrientation, true);

  function handleOrientation(event) {

    if (event.alpha != null) {

      heading = 360 - event.alpha;

      updateRotation();
    }
  }

  // 위치 계속 추적
  navigator.geolocation.watchPosition(

    function(position) {

      const lat = position.coords.latitude;
      const lon = position.coords.longitude;

      const currentPosition = new kakao.maps.LatLng(lat, lon);

      // 지도 중심 이동
      map.setCenter(currentPosition);

      // 기존 마커 제거
      if (overlay) {
        overlay.setMap(null);
      }

      // 커스텀 마커 생성
      overlay = new kakao.maps.CustomOverlay({
        position: currentPosition,
        content: `
          <div class="user-marker" id="userMarker"></div>
        `,
        yAnchor: 1
      });

      overlay.setMap(map);

      updateRotation();

    },

    function(error) {
      console.error(error);
      alert("위치 정보를 가져올 수 없습니다.");
    },

    {
      enableHighAccuracy: true,
      maximumAge: 0,
      timeout: 5000
    }

  );

  // 방향 회전
  function updateRotation() {

    const marker = document.getElementById("userMarker");

    if (marker) {
      marker.style.transform = `rotate(${heading}deg)`;
    }
  }

</script>

</body>
</html>
