<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>보행자 지도</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    #map {
      width: 100vw;
      height: 100vh;
    }

    .user-marker {
      width: 60px;
      height: 60px;

      background-image: url("icon/loc_icon.png");
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;

      transform-origin: center center;
    }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=75fcb2d4c1736608787e9ddc72170aad"></script>

<script>

  const map = new kakao.maps.Map(
    document.getElementById('map'),
    {
      center: new kakao.maps.LatLng(37.5665, 126.9780),
      level: 2
    }
  );

  let heading = 0;

  // 현재 위치
  let currentPosition = new kakao.maps.LatLng(37.5665, 126.9780);

  // 마커 한번만 생성
  const overlay = new kakao.maps.CustomOverlay({
    position: currentPosition,
    content: `
      <div class="user-marker" id="userMarker"></div>
    `,
    yAnchor: 0.5
  });

  overlay.setMap(map);

  // 위치 추적
  navigator.geolocation.watchPosition(

    (position) => {

      const lat = position.coords.latitude;
      const lon = position.coords.longitude;

      currentPosition = new kakao.maps.LatLng(lat, lon);

      // 마커 위치 이동
      overlay.setPosition(currentPosition);

      // 지도 중심 이동
      map.setCenter(currentPosition);

    },

    (error) => {
      console.error(error);
    },

    {
      enableHighAccuracy: true,
      maximumAge: 0,
      timeout: 10000
    }

  );

  // 방향 센서
  window.addEventListener(
    "deviceorientationabsolute",
    handleOrientation,
    true
  );

  window.addEventListener(
    "deviceorientation",
    handleOrientation,
    true
  );

  function handleOrientation(event) {

    if (event.alpha == null) return;

    /*
      회전 보정값
      ↑ 이미지 기준에 따라 조절
    */

    heading = event.alpha + 180;

    updateRotation();
  }

  function updateRotation() {

    const marker = document.getElementById("userMarker");

    if (!marker) return;

    marker.style.transform =
      `rotate(${heading}deg)`;
  }

</script>

</body>
</html>
