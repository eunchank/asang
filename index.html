<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>보행자 지도</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    #map {
      width: 100vw;
      height: 100vh;
    }

    /* 현재 위치 점 */
    .location-dot {
      width: 18px;
      height: 18px;
      background: #4285F4;
      border: 4px solid white;
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
      position: relative;
    }

    /* 방향 표시 부채꼴 */
    .direction-cone {
      position: absolute;
      width: 0;
      height: 0;
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-bottom: 50px solid rgba(66,133,244,0.25);

      left: 50%;
      bottom: 50%;

      transform-origin: center bottom;
      transform: translateX(-50%) rotate(0deg);
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=75fcb2d4c1736608787e9ddc72170aad"></script>

<script>

  const mapContainer = document.getElementById('map');

  const map = new kakao.maps.Map(mapContainer, {
    center: new kakao.maps.LatLng(37.5665, 126.9780),
    level: 2
  });

  let overlay = null;
  let accuracyCircle = null;

  // 방향값 저장
  let heading = 0;

  // 기기 방향 감지
  window.addEventListener("deviceorientationabsolute", handleOrientation, true);
  window.addEventListener("deviceorientation", handleOrientation, true);

  function handleOrientation(event) {

    if (event.alpha != null) {

      heading = 360 - event.alpha;

      updateDirection();
    }
  }

  // 현재 위치 계속 추적
  navigator.geolocation.watchPosition(

    function(position) {

      const lat = position.coords.latitude;
      const lon = position.coords.longitude;
      const accuracy = position.coords.accuracy;

      const currentPosition = new kakao.maps.LatLng(lat, lon);

      // 지도 중심 이동
      map.setCenter(currentPosition);

      // 정확도 원 제거
      if (accuracyCircle) {
        accuracyCircle.setMap(null);
      }

      // 정확도 원 생성
      accuracyCircle = new kakao.maps.Circle({
        center: currentPosition,
        radius: accuracy,
        strokeWeight: 1,
        strokeColor: '#4285F4',
        strokeOpacity: 0.5,
        fillColor: '#4285F4',
        fillOpacity: 0.15
      });

      accuracyCircle.setMap(map);

      // 기존 오버레이 제거
      if (overlay) {
        overlay.setMap(null);
      }

      // 현재 위치 + 방향 UI
      const content = `
        <div class="location-dot">
          <div class="direction-cone" id="cone"></div>
        </div>
      `;

      overlay = new kakao.maps.CustomOverlay({
        position: currentPosition,
        content: content,
        yAnchor: 0.5
      });

      overlay.setMap(map);

      updateDirection();

    },

    function(error) {
      console.error(error);
      alert("위치 정보를 가져올 수 없습니다.");
    },

    {
      enableHighAccuracy: true,
      maximumAge: 0,
      timeout: 5000
    }

  );

  // 방향 업데이트
  function updateDirection() {

    const cone = document.getElementById("cone");

    if (cone) {
      cone.style.transform =
        `translateX(-50%) rotate(${heading}deg)`;
    }
  }

</script>

</body>
</html>
