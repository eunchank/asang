<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>보행자 지도1</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    #map {
      width: 100vw;
      height: 100vh;
    }

    .user-marker {
      width: 60px;
      height: 60px;

      background: url("icon/loc_icon.png") center / contain no-repeat;

      transform-origin: center center;
    }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=75fcb2d4c1736608787e9ddc72170aad"></script>

<script>

  const map = new kakao.maps.Map(
    document.getElementById("map"),
    {
      center: new kakao.maps.LatLng(37.5665, 126.9780),
      level: 2
    }
  );

  // 현재 위치
  let currentPosition =
    new kakao.maps.LatLng(37.5665, 126.9780);

  // 방향값
  let targetHeading = 0;
  let currentHeading = 0;

  // 사용자 마커
  const overlay = new kakao.maps.CustomOverlay({
    position: currentPosition,
    content: `<div class="user-marker" id="userMarker"></div>`,
    yAnchor: 0.5
  });

  overlay.setMap(map);

  // 위치 추적
  navigator.geolocation.watchPosition(

    (position) => {

      currentPosition = new kakao.maps.LatLng(
        position.coords.latitude,
        position.coords.longitude
      );

      overlay.setPosition(currentPosition);

      map.setCenter(currentPosition);
    },

    (error) => {
      console.error(error);
    },

    {
      enableHighAccuracy: true,
      maximumAge: 0,
      timeout: 10000
    }

  );

  // 방향 센서
  function handleOrientation(event) {

    if (event.alpha == null) return;

    // 회전 보정값
    targetHeading = event.alpha + 90;
  }

  window.addEventListener(
    "deviceorientationabsolute",
    handleOrientation,
    true
  );

  window.addEventListener(
    "deviceorientation",
    handleOrientation,
    true
  );

  // 부드러운 회전
  function animateRotation() {

    const marker =
      document.getElementById("userMarker");

    if (marker) {

      let diff =
        targetHeading - currentHeading;

      // 최단 회전 방향
      if (diff > 180) diff -= 360;
      if (diff < -180) diff += 360;

      // 회전 부드럽게
      currentHeading += diff * 0.08;

      marker.style.transform =
        `rotate(${currentHeading}deg)`;
    }

    requestAnimationFrame(animateRotation);
  }

  animateRotation();

</script>

</body>
</html>
