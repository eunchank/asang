<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>과제용 지도 앱</title>
    <style>
        #map { width: 100%; height: 500px; border: 1px solid #ccc; }
        body { padding: 20px; }
    </style>
</head>
<body>
    <h3>📍 아주대학교 테스트 지도</h3>
    <div id="map"></div>

    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=75fcb2d4c1736608787e9ddc72170aad"></script>

    <script>
        // 2. 브라우저가 모든 리소스를 다 읽은 후 실행되도록 설정
        window.onload = function() {
            // kakao 객체가 로드되었는지 최종 확인
            if (window.kakao && window.kakao.maps) {
                var container = document.getElementById('map');
                var options = {
                    center: new kakao.maps.LatLng(37.2831, 127.0448), // 아주대 정문
                    level: 3
                };

                var map = new kakao.maps.Map(container, options);

                // 마커 추가
                var marker = new kakao.maps.Marker({
                    position: new kakao.maps.LatLng(37.2831, 127.0448)
                });
                marker.setMap(map);
            } else {
                console.error("카카오 지도 SDK가 로드되지 않았습니다.");
            }
        };
    </script>
</body>
</html>
