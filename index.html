<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>내 위치 기록 앱</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        #map { width: 100%; height: 100%; }

        /* 우측 하단 추가 버튼 */
        .add-btn {
            position: absolute; bottom: 30px; right: 30px; width: 60px; height: 60px;
            background-color: #3399ff; color: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer; z-index: 10;
        }

        /* 입력 모달창 */
        #modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; max-width: 320px; background: white; padding: 20px;
            border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.2); z-index: 20;
        }
        #modal h4 { margin-top: 0; }
        #modal input, #modal textarea { width: 100%; margin-bottom: 10px; box-sizing: border-box; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        #modal button { width: 100%; padding: 12px; background: #3399ff; color: white; border: none; border-radius: 5px; font-weight: bold; }

        /* 인포윈도우 스타일 */
        .info-box { padding: 10px; width: 200px; }
        .info-box img { width: 100%; border-radius: 5px; margin-bottom: 5px; }
        .info-box p { margin: 0; font-size: 13px; color: #333; word-break: break-all; }
    </style>
</head>
<body>

    <div id="map"></div>
    <div class="add-btn" onclick="openModal()">+</div>

    <div id="modal">
        <h4>📸 현재 위치 기록</h4>
        <input type="file" id="imageInput" accept="image/*">
        <textarea id="memo" placeholder="지금 이 장소의 기록을 남겨보세요" rows="3"></textarea>
        <button onclick="saveMarker()">기록하기</button>
        <button onclick="closeModal()" style="background:#ccc; margin-top:5px;">취소</button>
    </div>

    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=75fcb2d4c1736608787e9ddc72170aad"></script>

    <script>
        var map;
        var userLat, userLng; // 현위치 저장 변수
        var locMarker; // 현위치 표시 마커

        window.onload = function() {
            var container = document.getElementById('map');
            var options = {
                center: new kakao.maps.LatLng(37.2831, 127.0448), // 초기값은 아주대
                level: 3
            };
            map = new kakao.maps.Map(container, options);

            // 1. 현위치 추적 시작
            startTracking();
            // 저장된 데이터 불러오기
            loadMarkers();
        };

        // GPS로 현위치 가져오기
        function startTracking() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(function(position) {
                    userLat = position.coords.latitude;
                    userLng = position.coords.longitude;
                    var locPosition = new kakao.maps.LatLng(userLat, userLng);

                    displayMyLocation(locPosition);
                });
            } else {
                alert("이 브라우저에서는 GPS를 사용할 수 없습니다.");
            }
        }

        // 현위치 마커 표시 (파란색 원 등 구분 필요시 커스텀 가능)
        function displayMyLocation(locPosition) {
            if (!locMarker) {
                locMarker = new kakao.maps.Marker({ map: map, position: locPosition });
                map.setCenter(locPosition);
            } else {
                locMarker.setPosition(locPosition);
            }
        }

        function openModal() { document.getElementById('modal').style.display = 'block'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        // 사진 파일 읽기 및 마커 저장
        function saveMarker() {
            var fileInput = document.getElementById('imageInput');
            var memo = document.getElementById('memo').value;

            if (!userLat || !userLng) {
                alert("아직 위치 정보를 가져오지 못했습니다.");
                return;
            }

            if (fileInput.files && fileInput.files[0]) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    var imageData = e.target.result; // Base64 인코딩된 이미지 데이터
                    
                    var markerData = {
                        lat: userLat,
                        lng: userLng,
                        img: imageData,
                        text: memo
                    };

                    createMarker(markerData);
                    saveToLocal(markerData);
                    closeModal();
                };
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                alert("사진을 업로드해주세요.");
            }
        }

        function createMarker(data) {
            var marker = new kakao.maps.Marker({
                position: new kakao.maps.LatLng(data.lat, data.lng),
                map: map
            });

            var content = `
                <div class="info-box">
                    <img src="${data.img}">
                    <p>${data.text}</p>
                </div>`;

            var infowindow = new kakao.maps.InfoWindow({ content: content, removable: true });
            kakao.maps.event.addListener(marker, 'click', function() {
                infowindow.open(map, marker);
            });
        }

        function saveToLocal(data) {
            var saved = JSON.parse(localStorage.getItem('myMarkers') || '[]');
            saved.push(data);
            try {
                localStorage.setItem('myMarkers', JSON.stringify(saved));
            } catch (e) {
                alert("저장 공간이 부족합니다. 사진 용량이 너무 클 수 있습니다.");
            }
        }

        function loadMarkers() {
            var saved = JSON.parse(localStorage.getItem('myMarkers') || '[]');
            saved.forEach(function(data) { createMarker(data); });
        }
    </script>
</body>
</html>
